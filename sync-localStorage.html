<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sincronizar localStorage → Base de Datos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; padding: 40px 20px; }
    .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 12px; padding: 40px; box-shadow: 0 4px 6px rgba(0,0,0,0.07); }
    h1 { font-size: 24px; margin-bottom: 8px; }
    p { color: #666; margin-bottom: 24px; line-height: 1.6; }
    .status { background: #f0f0f0; border-left: 4px solid #007bff; padding: 16px; border-radius: 4px; margin-bottom: 20px; font-family: monospace; font-size: 13px; max-height: 300px; overflow-y: auto; }
    .status.success { border-left-color: #28a745; background: #f0fff4; }
    .status.error { border-left-color: #dc3545; background: #fff5f5; }
    button { background: #007bff; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; }
    button:hover { background: #0056b3; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .item-count { display: inline-block; background: #e7f3ff; color: #0056b3; padding: 2px 8px; border-radius: 4px; font-weight: 600; margin-left: 4px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔄 Sincronizar localStorage</h1>
    <p>Este panel verifica qué datos tienes en localStorage y los envía a la base de datos.</p>

    <div class="status" id="status">
      <div>Analizando datos locales...</div>
    </div>

    <button id="syncBtn" onclick="syncData()">Sincronizar con BD</button>
  </div>

  <script>
    const KEYS = {
      materials: 'ca_materials',
      projects: 'ca_projects',
      testimonials: 'ca_testimonials',
      brands: 'ca_brands',
      budgets: 'ca_budgets',
      clients: 'ca_clients',
    };

    const API_ENDPOINTS = {
      materials: '/api/materials',
      projects: '/api/projects',
      testimonials: '/api/testimonials',
      brands: '/api/brands',
      budgets: '/api/budgets',
      clients: '/api/clients',
    };

    function log(msg) {
      const status = document.getElementById('status');
      status.innerHTML += msg + '<br>';
      status.scrollTop = status.scrollHeight;
    }

    function checkLocalData() {
      const status = document.getElementById('status');
      status.innerHTML = '';

      log('📋 Datos en localStorage:');
      log('');

      let hasData = false;
      for (const [key, storageKey] of Object.entries(KEYS)) {
        try {
          const raw = localStorage.getItem(storageKey);
          if (raw) {
            const data = JSON.parse(raw);
            if (Array.isArray(data) && data.length > 0) {
              log(`✅ ${key}: <span class="item-count">${data.length} items</span>`);
              hasData = true;
            } else {
              log(`⚪ ${key}: vacío`);
            }
          } else {
            log(`⚪ ${key}: no encontrado`);
          }
        } catch (e) {
          log(`❌ ${key}: error al leer (${e.message})`);
        }
      }

      log('');
      if (!hasData) {
        log('✨ No hay datos locales para sincronizar.');
        document.getElementById('syncBtn').disabled = true;
      } else {
        log('Haz click en "Sincronizar con BD" para enviar estos datos.');
      }
    }

    async function syncData() {
      const status = document.getElementById('status');
      const btn = document.getElementById('syncBtn');

      btn.disabled = true;
      status.innerHTML = '';
      status.className = 'status';

      log('🔄 Sincronizando datos a BD...');
      log('');

      let synced = 0;
      let errors = 0;

      for (const [key, storageKey] of Object.entries(KEYS)) {
        try {
          const raw = localStorage.getItem(storageKey);
          if (!raw) continue;

          const data = JSON.parse(raw);
          if (!Array.isArray(data) || data.length === 0) continue;

          log(`📤 Sincronizando ${key}...`);

          for (const item of data) {
            try {
              const res = await fetch(API_ENDPOINTS[key], {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(item),
              });

              if (!res.ok) {
                log(`   ❌ Error: ${await res.text()}`);
                errors++;
              } else {
                synced++;
              }
            } catch (e) {
              log(`   ❌ ${e.message}`);
              errors++;
            }
          }

          log(`   ✅ ${key}: ${data.length} items enviados`);
        } catch (e) {
          log(`❌ Error procesando ${key}: ${e.message}`);
          errors++;
        }
      }

      log('');
      if (errors === 0) {
        status.className = 'status success';
        log(`🎉 Sincronización completada: ${synced} items guardados en BD`);
      } else {
        status.className = 'status error';
        log(`⚠️ Sincronización parcial: ${synced} items OK, ${errors} errores`);
      }

      btn.disabled = false;
    }

    // Analizar datos al cargar
    checkLocalData();
  </script>
</body>
</html>
